spring:
  application:
    name: dimuapi
  config:
    import:
      - optional:classpath:env.properties
      - optional:classpath:application_prod.yml
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect:  org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: always
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
            required: true
        transport:
          protocol: smtp

logging:
  level:
#    org.springframework.security: TRACE
    org:
      springframework:
        security: TRACE
        messaging: DEBUG
        web:
          socket: DEBUG
  pattern:
    console: "%green(%d{yyyy-MM-dd HH:mm:ss}) %blue(%-5level) %red([%thread]) %yellow(%logger{36}) - %msg%n"
  file:
    name: logs/application.log


aws:
  accessKeyId: ${AWS_KEY}
  secretKey: ${AWS_SECRET}
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_BUCKET_NAME}
paystack:
  publicKey: ${PAYSTACK_PUBLIC_KEY}
  secretKey: ${PAYSTACK_SECRET_KEY}

jwtScret: ${JWT_SECRET_KEY}