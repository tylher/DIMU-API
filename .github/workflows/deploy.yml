name: Build and Deploy to EC2

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platform: linux/amd64
          push: true
          tags: damolacodes/diimu-api:1.0

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_PEM_KEY }}
          HOSTNAME: ${{ secrets.EC2_HOST }}
          USER_NAME: ${{ secrets.EC2_USERNAME }}
        run: |
          # Save the private key and set secure permissions
          echo "$PRIVATE_KEY" > private_key
          chmod 600 private_key

          # SSH into EC2 and run all commands on the server
          ssh -o StrictHostKeyChecking=no -i private_key ${USER_NAME}@${HOSTNAME} \
          "sudo docker compose pull && sudo docker compose up -d && echo 'App deployed successfully on EC2'"

          # Optional: remove the private key after deployment
          rm -f private_key
